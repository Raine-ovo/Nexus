server:
  http_addr: ":18234"
  ws_addr: ":18235"
  read_timeout: 5m
  write_timeout: 5m

model:
  provider: "openai"
  model_name: "glm-5.1"
  api_key: "51eb19fdb4bb479882e4632934218664.m6xoQdVSHGYrbZKZ"
  base_url: "https://open.bigmodel.cn/api/paas/v4/"
  max_tokens: 4096
  temperature: 0.1
  max_concurrency: 1
  min_request_interval_ms: 5000

agent:
  max_iterations: 4
  token_threshold: 30000
  compact_target_ratio: 0.6
  micro_compact_size: 20000
  output_persist_dir: ".outputs"

rag:
  chunk_size: 512
  chunk_overlap: 64
  embedding_dim: 1536
  top_k: 2
  rerank_top_k: 1
  knowledge_dir: ".knowledge"
  vector_backend: "memory"
  keyword_backend: "memory"

memory:
  conversation_window: 8
  max_semantic_entries: 100
  semantic_file: ".memory/semantic.yaml"
  compaction_threshold: 30000

planning:
  task_dir: ".tasks"
  max_background_slots: 1
  cron_poll_interval: 60s

team:
  dir: ".team-scope-continuity-smoke"
  poll_interval: 3s
  idle_timeout: 5m

run:
  sandbox_dir: ".runs/scope-continuity-smoke"

gateway:
  lanes:
    main:
      max_concurrency: 1
  auth:
    api_keys:
      - "nexus-local-dev-key"
    jwt_secret: ""
  rate_limit:
    enabled: true
    rps: 20
    burst: 40

mcp:
  server_enabled: false

permission:
  mode: "full_auto"
  workspace_root: "."
  dangerous_patterns:
    - "rm -rf /"
    - "sudo"

reflection:
  enabled: false

observability:
  trace_enabled: true
  metrics_enabled: true
  log_level: "info"
