server:
  http_addr: ":8080"
  ws_addr: ":8081"
  read_timeout: 10m
  write_timeout: 10m

model:
  provider: "openai"
  model_name: "glm-5.1"
  api_key: "${NEXUS_API_KEY}"
  base_url: "https://open.bigmodel.cn/api/paas/v4/"
  max_tokens: 8192
  temperature: 0.7

agent:
  max_iterations: 20
  token_threshold: 100000
  compact_target_ratio: 0.6
  micro_compact_size: 51200
  output_persist_dir: ".outputs"

rag:
  chunk_size: 512
  chunk_overlap: 64
  embedding_dim: 1536
  top_k: 5
  rerank_top_k: 3
  knowledge_dir: ".knowledge"
  # vector_backend: "memory" or "milvus"
  vector_backend: "memory"
  # keyword_backend: "memory" (TF-IDF) or "elasticsearch" (BM25)
  keyword_backend: "memory"
  elasticsearch:
    addresses:
      - "http://localhost:9200"
    index_name: "nexus_chunks"
    # username: ""
    # password: ""
    shards: 1
    replicas: 0
    bm25_k1: 1.2
    bm25_b: 0.75
    auto_create: true
  milvus:
    address: "localhost:19530"
    collection_name: "nexus_vectors"
    metric_type: "COSINE"
    index_type: "IVF_FLAT"
    nlist: 128
    nprobe: 16
    consistency_level: "Session"
    auto_create_collection: true

memory:
  conversation_window: 20
  max_semantic_entries: 500
  semantic_file: ".memory/semantic.yaml"
  compaction_threshold: 80000

planning:
  task_dir: ".tasks"
  max_background_slots: 3
  cron_poll_interval: 60s

team:
  dir: ".team"

run:
  sandbox_dir: ""

gateway:
  lanes:
    main:
      max_concurrency: 1
    cron:
      max_concurrency: 1
    background:
      max_concurrency: 3

permission:
  mode: "semi_auto"
  workspace_root: "."
  dangerous_patterns:
    - "rm -rf /"
    - "sudo"
    - "chmod 777"
    - "> /dev/sda"
    - "mkfs"

reflection:
  enabled: false
  max_attempts: 3
  threshold: 0.7
  enable_prospect: true
  memory_file: ".memory/reflections.yaml"
  max_mem_entries: 200

observability:
  trace_enabled: true
  metrics_enabled: true
  log_level: "info"
